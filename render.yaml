services:
  # 1. Backend Service (Node.js)
  - type: web
    name: anandamoyee-backend
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_BUCKET_NAME
        value: edusathi
      - key: AWS_S3_FOLDER
        value: anandamoyee-india/uploads
      - key: PORT
        value: 5000
    branch: main

  # 2. Frontend Service (Static Site)
  - type: web
    name: anandamoyee-frontend
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_ADMIN_USERNAME
        sync: false
      - key: VITE_ADMIN_PASSWORD
        sync: false
      - key: VITE_API_URL
        value: https://anandamoyee-backend.onrender.com/api
    branch: main
    routes:
      # Proxy ALL /api/* requests to the backend service
      - type: rewrite
        source: /api/*
        destination: https://anandamoyee-backend.onrender.com/api/*
      # Proxy uploads to backend (if any local storage remained)
      - type: rewrite
        source: /uploads/*
        destination: https://anandamoyee-backend.onrender.com/uploads/*
      # SPA routing fallback
      - type: rewrite
        source: /*
        destination: /index.html
